<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Checklist de campo para equipes de saneamento. Controle de materiais para ligação e reparo de esgoto.">
  <meta name="theme-color" content="#0D47A1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Checklist de Campo - Saneamento</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ===== HEADER FIXO ===== -->
  <header class="app-header" id="app-header">
    <div class="header-top">
      <div class="header-brand">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
        </svg>
        <h1>Checklist de Campo</h1>
      </div>
      <div class="header-right">
        <button class="header-admin-btn" id="btn-admin" aria-label="Painel administrativo" onclick="AdminService.openPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <span id="sync-badge" class="sync-badge hidden" aria-live="polite" aria-label="Itens pendentes de sincronização">0</span>
        <div class="header-status" id="status-badge">
          <span class="status-dot"></span>
          <span class="status-text">Online</span>
        </div>
      </div>
    </div>
    <div class="header-date" id="header-date"></div>
    <div class="header-team">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <input type="text" id="input-team-name" placeholder="Nome da equipe..." aria-label="Nome da equipe">
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">0/0 (0%)</div>
  </header>

  <!-- ===== TABS DE ATIVIDADE ===== -->
  <nav class="tabs-nav" id="tabs-nav" role="navigation" aria-label="Atividades">
    <!-- Rendered dynamically by UI.renderTabs() -->
  </nav>

  <!-- ===== VIEW: CHECKLIST (principal) ===== -->
  <main class="view active" id="view-checklist" role="main">
    <div class="main-content" id="checklist-content">
      <!-- Skeleton loader — removed after init -->
      <div id="skeleton-loader" aria-hidden="true">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card skeleton-short"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card skeleton-short"></div>
      </div>
    </div>

    <!-- Footer actions -->
    <div class="footer-actions">
      <div class="footer-row">
        <button class="btn-action btn-export" id="btn-export-pdf" aria-label="Exportar checklist como PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          PDF
        </button>
        <button class="btn-action btn-share" id="btn-share" aria-label="Compartilhar resumo do checklist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
          </svg>
          Compartilhar
        </button>
      </div>
      <div class="footer-row">
        <button class="btn-action btn-templates-btn" id="btn-templates" aria-label="Gerenciar templates salvos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" />
          </svg>
          Templates
        </button>
        <button class="btn-action btn-new-day" id="btn-new-day" aria-label="Iniciar novo dia (limpar checklist)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M1 4v6h6M23 20v-6h-6" />
            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />
          </svg>
          Novo Dia
        </button>
      </div>
      <button class="btn-notif-toggle" id="btn-notif" aria-label="Ativar notificações de lembrete" onclick="App.requestNotificationPermission()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        Ativar lembrete diário
      </button>
    </div>
  </main>

  <!-- ===== VIEW: HISTÓRICO ===== -->
  <section class="view" id="view-history">
    <!-- Rendered dynamically by HistoryView -->
  </section>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav" role="navigation" aria-label="Navegação principal">
    <button class="bottom-nav-btn active" data-view="checklist" aria-label="Ver checklist" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M9 11l3 3L22 4" />
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
      </svg>
      <span>Checklist</span>
    </button>
    <button class="bottom-nav-btn" data-view="history" aria-label="Ver histórico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      <span>Histórico</span>
    </button>
  </nav>

  <!-- ===== MODAL: ADICIONAR ITEM ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-add-item">
      <div class="modal-header">
        <h2 id="modal-title">Adicionar Material</h2>
        <button class="modal-close" id="modal-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <form id="form-add-item" autocomplete="off">
        <div class="form-group">
          <label for="input-item-name">Nome do Material *</label>
          <input type="text" id="input-item-name" placeholder="Ex: Luva de Redução" required>
        </div>
        <div class="form-group">
          <label for="input-item-qty">Quantidade / Detalhe <span class="optional">(opcional)</span></label>
          <input type="text" id="input-item-qty" placeholder="Ex: 5 unidades, 100mm">
        </div>
        <input type="hidden" id="input-item-activity">
        <button type="submit" class="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M5 13l4 4L19 7" /></svg>
          Salvar Material
        </button>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: NOVA ATIVIDADE ===== -->
  <div class="modal-overlay" id="modal-activity-overlay">
    <div class="modal" id="modal-add-activity">
      <div class="modal-header">
        <h2>Nova Atividade</h2>
        <button class="modal-close" id="modal-activity-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <form id="form-add-activity" autocomplete="off">
        <div class="form-group">
          <label for="input-activity-name">Nome da Atividade *</label>
          <input type="text" id="input-activity-name" placeholder="Ex: Manutenção de Poço" required>
        </div>
        <button type="submit" class="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M5 13l4 4L19 7" /></svg>
          Criar Atividade
        </button>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: TEMPLATES ===== -->
  <div class="modal-overlay" id="modal-templates-overlay">
    <div class="modal" id="modal-templates">
      <div class="modal-header">
        <h2>Templates</h2>
        <button class="modal-close" id="modal-templates-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <div id="templates-list"><!-- rendered by JS --></div>
      <button class="btn-save" id="btn-save-template" style="margin-top: 12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" /></svg>
        Salvar checklist atual como template
      </button>
    </div>
  </div>

  <!-- ===== MODAL: ASSINATURA DIGITAL ===== -->
  <div class="modal-overlay" id="modal-signature-overlay">
    <div class="modal" id="modal-signature">
      <div class="modal-header">
        <h2>Assinar Relatório</h2>
        <button class="modal-close" id="modal-sig-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <p style="font-size:0.82rem; color: var(--clr-text-secondary); margin-bottom: 8px;">
        Assine com o dedo na área abaixo
      </p>
      <canvas id="signature-canvas" width="400" height="160" style="border: 1.5px solid var(--clr-border); border-radius: var(--radius-md); touch-action: none; width: 100%; background: #fff;"></canvas>
      <div style="display:flex; gap: 10px; margin-top: 12px;">
        <button class="btn-action" id="btn-sig-clear" style="background: var(--clr-border); color: var(--clr-text); flex:1;">Limpar</button>
        <button class="btn-save" id="btn-sig-confirm" style="flex:2;">Confirmar e Exportar PDF</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: PIN DE ACESSO ADMIN ===== -->
  <div class="modal-overlay" id="modal-admin-pin-overlay">
    <div class="modal" id="modal-admin-pin">
      <div class="modal-header">
        <h2>Acesso Administrativo</h2>
        <button class="modal-close" onclick="document.getElementById('modal-admin-pin-overlay').classList.remove('active')" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <p style="font-size:0.82rem; color: var(--clr-text-secondary); margin-bottom: 12px;">Digite o PIN para acessar as configurações</p>
      <input type="password" id="input-admin-pin" maxlength="6" placeholder="PIN" class="admin-pin-input" inputmode="numeric">
      <div id="admin-pin-error" class="admin-pin-error hidden">PIN incorreto. Tente novamente.</div>
      <button class="btn-save" id="btn-admin-pin-confirm" style="margin-top: 12px;">Entrar</button>
    </div>
  </div>

  <!-- ===== MODAL: PAINEL ADMIN ===== -->
  <div class="modal-overlay" id="modal-admin-overlay">
    <div class="modal modal-admin" id="modal-admin">
      <div class="modal-header">
        <h2>⚙️ Painel Admin</h2>
        <button class="modal-close" onclick="document.getElementById('modal-admin-overlay').classList.remove('active')" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <div id="admin-content" style="max-height: 65vh; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <!-- CDN Dependencies -->
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

  <!-- App Modules (order matters) -->
  <script src="js/db.js"></script>
  <script src="js/state.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/history.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/share.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
